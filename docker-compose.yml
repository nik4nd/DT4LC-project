services:
  # Ollama LLM Server (CPU mode) - only starts with --profile ollama
  ollama:
    image: ollama/ollama:latest
    container_name: dt4lc-ollama
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Ollama model puller (one-time setup) - only with --profile ollama
  ollama-pull:
    image: curlimages/curl:latest
    container_name: dt4lc-ollama-pull
    profiles:
      - ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Pulling llama3.2 model...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}' &&
        echo 'Model pull complete!'
      "
    restart: "no"

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dt4lc-backend
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # LLM Provider Selection (from .env)
      - LLM_ENABLE_GEMINI=${LLM_ENABLE_GEMINI:-true}
      - LLM_ENABLE_GROQ=${LLM_ENABLE_GROQ:-true}
      - LLM_ENABLE_OLLAMA=${LLM_ENABLE_OLLAMA:-false}
      - LLM_ENABLE_APERTUS=${LLM_ENABLE_APERTUS:-false}
      - LLM_PROVIDER_ORDER=${LLM_PROVIDER_ORDER:-gemini,groq}
      - LLM_STRATEGY=${LLM_STRATEGY:-fallback}
      # LLM API Keys and Models
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODELS=${GEMINI_MODELS:-gemini-2.0-flash-exp}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      # Ollama Configuration (only used if LLM_ENABLE_OLLAMA=true)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      # Apertus Configuration (disabled by default - requires GPU)
      - APERTUS_ENABLED=${APERTUS_ENABLED:-false}
      - APERTUS_MODEL=${APERTUS_MODEL:-swiss-ai/Apertus-8B}
      - APERTUS_DEVICE=${APERTUS_DEVICE:-0}
      - APERTUS_DTYPE=${APERTUS_DTYPE:-bfloat16}
      # Cache paths - all consolidated under resources/.cache/
      - DT4LC_MODEL_CACHE=/app/resources/.cache/models
      - DT4LC_UPLOADS_PATH=/app/resources/.cache/uploads
      # Job storage backend (memory or sqlite)
      - JOB_STORAGE=${JOB_STORAGE:-sqlite}
      - DT4LC_JOBS_DB=/app/resources/.cache/jobs.db
    volumes:
      # Mount resources with read-write for cache subdirectory
      - ./resources:/app/resources
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./cognitive_ui
      dockerfile: Dockerfile
    container_name: dt4lc-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
