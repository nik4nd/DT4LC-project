name: Docker Build & Push

on:
  push:
    branches: [master, main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to registry"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR builds, but never cancel push events (master/tags)
  # or manual dispatches — cancelling a release build mid-flight would leave
  # a published image at GHCR with no matching GitHub Release.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Extract version and metadata
  prepare:
    name: Prepare Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}
      push: ${{ steps.check.outputs.push }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version info
        id: version
        run: |
          # Get version from dta/__init__.py
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' dta/__init__.py)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Check if should push
        id: check
        run: |
          # Push on: tags, master/main branch push, or manual trigger with push_images=true
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "push=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && ("${{ github.ref }}" == "refs/heads/master" || "${{ github.ref }}" == "refs/heads/main") ]]; then
            echo "push=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push_images }}" == "true" ]]; then
            echo "push=true" >> $GITHUB_OUTPUT
          else
            echo "push=false" >> $GITHUB_OUTPUT
          fi

  # Build and push backend image
  backend:
    name: Backend Image
    runs-on: ubuntu-latest
    needs: [prepare]
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            # Tag with version on release tags (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Tag with major.minor on release tags (v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Tag with major on release tags (v1.0.0 -> 1)
            type=semver,pattern={{major}}
            # Tag with branch name (master -> master)
            type=ref,event=branch
            # Tag with PR number (pr-123)
            type=ref,event=pr
            # Tag with sha (sha-abc1234)
            type=sha,prefix=sha-
            # Tag with version from code + sha
            type=raw,value=${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.sha_short }}
            # Latest tag only on master/main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ needs.prepare.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            GIT_SHA=${{ github.sha }}

  # Build and push frontend image
  frontend:
    name: Frontend Image
    runs-on: ubuntu-latest
    needs: [prepare]
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.sha_short }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./cognitive_ui
          file: ./cognitive_ui/Dockerfile
          push: ${{ needs.prepare.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}

  # Summary job
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [prepare, backend, frontend]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ needs.prepare.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | ${{ needs.prepare.outputs.sha_short }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Push | ${{ needs.prepare.outputs.push }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.prepare.outputs.push }}" == "true" ]]; then
            echo "### Images Published" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
            echo "${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.prepare.outputs.version }}-${{ needs.prepare.outputs.sha_short }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

  # GitHub Release job — fires only on v*.*.* tags after both images publish.
  # Creates a Release with auto-generated notes, GHCR pull commands, and a
  # small deploy bundle (docker-compose.yml + .env.example) as a Release asset.
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, backend, frontend]
    if: startsWith(github.ref, 'refs/tags/v') && needs.backend.result == 'success' && needs.frontend.result == 'success'
    timeout-minutes: 10
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can diff against the previous tag for
          # changelog generation.
          fetch-depth: 0

      - name: Build deploy bundle
        run: |
          STAGE=/tmp/dt4lc-deploy-${{ needs.prepare.outputs.version }}
          mkdir -p "$STAGE"
          cp docker-compose.yml "$STAGE/"
          cp .env.example "$STAGE/"
          cp README.md "$STAGE/"
          cp LICENSE "$STAGE/"
          (cd /tmp && zip -r "dt4lc-deploy-${{ needs.prepare.outputs.version }}.zip" "dt4lc-deploy-${{ needs.prepare.outputs.version }}")
          ls -la /tmp/dt4lc-deploy-${{ needs.prepare.outputs.version }}.zip

      - name: Generate release notes
        id: notes
        env:
          BACKEND_REF: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.prepare.outputs.version }}
          FRONTEND_REF: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.prepare.outputs.version }}
        run: |
          # Find previous tag (best-effort; first release will have none).
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
            COMPARE_LINE="**Compare:** [\`${PREV_TAG}...${{ github.ref_name }}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }})"
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)")
            COMPARE_LINE="**Initial release.**"
          fi

          {
            echo "notes<<EOF_NOTES"
            echo "$COMPARE_LINE"
            echo ""
            echo "## Container Images"
            echo ""
            echo "Both images are published to GitHub Container Registry. Pull with:"
            echo ""
            echo '```sh'
            echo "docker pull ${BACKEND_REF}"
            echo "docker pull ${FRONTEND_REF}"
            echo '```'
            echo ""
            echo "## Quick Deploy"
            echo ""
            echo "Download \`dt4lc-deploy-${{ needs.prepare.outputs.version }}.zip\` (attached below), then:"
            echo ""
            echo '```sh'
            echo "unzip dt4lc-deploy-${{ needs.prepare.outputs.version }}.zip"
            echo "cd dt4lc-deploy-${{ needs.prepare.outputs.version }}"
            echo "cp .env.example .env  # then edit to add API keys (optional)"
            echo "docker compose up -d  # backend on :8000, frontend on :80"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            echo "$CHANGES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DT4LC ${{ needs.prepare.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          # Auto-flag pre-releases on -alpha / -beta / -rc tags so stable
          # tags (v0.3.0, v1.0.0) appear as "Latest release" on GitHub.
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            /tmp/dt4lc-deploy-${{ needs.prepare.outputs.version }}.zip
