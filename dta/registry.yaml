version: "0.1"
types:
 - NDVIMap
 - NDWIMap  # Water index output
 - NDSIMap  # Snow index output
 - EVIMap
 - SnowClassification  # Multi-criteria snow classification
 - LULCMap  # Land use / land cover classification
 - Reconstruction  # Prithvi MAE reconstruction outputs
 - RasterPath
 - RasterPathBefore
 - RasterPathAfter
 - IndexType  # Type of spectral index (ndvi, ndsi, ndwi)
 - Statistics
 - ChangeMap
 - FieldBoundaries

instances:
  # Standard single-file input (default for most analyses)
  - id: input/file
    kind: input
    keywords: [file, raster, data, image, input]
    inputs: []
    outputs: [RasterPath]
    runner:
      type: passthrough

  # Multi-file inputs for change detection only
  - id: input/file-before
    kind: input
    keywords: [before, first, earlier, pre, baseline]
    inputs: []
    outputs: [RasterPathBefore]
    runner:
      type: passthrough

  - id: input/file-after
    kind: input
    keywords: [after, second, later, post, current]
    inputs: []
    outputs: [RasterPathAfter]
    runner:
      type: passthrough

  - id: algorithms/ndvi
    kind: algorithm
    display_name: "NDVI Calculation"
    description: |
      NDVI (Normalized Difference Vegetation Index) for vegetation health analysis.
      Computed as (NIR - Red) / (NIR + Red). Values range from -1 to 1, where higher
      values indicate healthier vegetation. Useful for crop monitoring and land cover.
    interpretation: |
      NDVI ranges from -1 to 1. Values >0.6 indicate dense, healthy vegetation; 0.4-0.6
      moderate vegetation cover; 0.2-0.4 sparse vegetation or senescent crops; <0.2 bare
      soil or stressed vegetation; negative values indicate water, clouds, or snow.
      Standard deviation reflects landscape heterogeneity.
    keywords: [ndvi, vegetation, index, health, greenness]
    inputs: [RasterPath]
    outputs: [NDVIMap]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.ndvi"
    triggers:
      keywords: [ndvi, vegetation, "vegetation health", "vegetation index", greenness]
      action_phrases:
        - "calculate ndvi"
        - "compute ndvi"
        - "run ndvi"
        - "perform ndvi"
        - "ndvi calculation"
        - "ndvi analysis"
    user_guide:
      capability_response: |
        Yes, I can calculate NDVI (Normalized Difference Vegetation Index) to analyze
        vegetation health from satellite imagery. Please upload a GeoTIFF image with
        NIR and Red bands, and I'll process it for you.
      missing_file_response: |
        I'd be happy to calculate NDVI for you! Please upload a GeoTIFF image
        with NIR and Red bands, and I'll analyze the vegetation health.
      summary_template: "Analyzing vegetation health using NDVI"
    config:
      formula: ndvi
      required_bands: [red, nir]
      colormap: ndvi
      vmin: -0.2
      vmax: 0.8

  - id: algorithms/evi
    kind: algorithm
    display_name: "EVI Calculation"
    description: |
      EVI (Enhanced Vegetation Index) for vegetation health analysis.
      Computed as 2.5 * (NIR - RED) / ((NIR + 6*RED - 7.5*BLUE) + 1). Values range from -1 to 1, where higher
      values indicate healthier vegetation. Useful for crop monitoring and land cover.
    interpretation: |
      EVI ranges from -1 to 1. Values >0.6 indicate dense, healthy vegetation; 0.4-0.6
      moderate vegetation cover; 0.2-0.4 sparse vegetation or senescent crops; <0.2 bare
      soil or stressed vegetation; negative values indicate water, clouds, or snow.
      Standard deviation reflects landscape heterogeneity.
    keywords: [evi, vegetation, index, health, greenness]
    inputs: [RasterPath]
    outputs: [EVIMap]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.evi"
    triggers:
      keywords: [evi, "enhanced vegetation index", vegetation, greenness]
      action_phrases:
        - "calculate evi"
        - "compute evi"
        - "run evi"
        - "perform evi"
        - "evi calculation"
        - "evi analysis"
    user_guide:
      capability_response: |
        Yes, I can calculate EVI (Enhanced Vegetation Index), which improves on NDVI in
        high-biomass regions by reducing soil-background and atmospheric influence.
        Please upload a GeoTIFF image with Blue, Red, and NIR bands.
      missing_file_response: |
        I'd be happy to calculate EVI for you! Please upload a GeoTIFF image with
        Blue, Red, and NIR bands and I'll analyze the vegetation health.
      summary_template: "Analyzing vegetation health using EVI"
    config:
      formula: evi
      required_bands: [blue, red, nir]
      colormap: ndvi
      vmin: -0.2
      vmax: 0.8

  - id: algorithms/ndwi
    kind: algorithm
    display_name: "NDWI Calculation"
    description: |
      NDWI (Normalized Difference Water Index) for water body detection.
      Computed as (Green - NIR) / (Green + NIR). Positive values indicate water.
      Useful for mapping lakes, rivers, floods, and wetlands.
    interpretation: |
      NDWI ranges from -1 to 1. Values >0.3 indicate open water; 0.0-0.3 possible
      water or wetland; <0.0 non-water surfaces (vegetation shows negative NDWI).
      Water percentage indicates proportion of pixels classified as water.
    keywords: [ndwi, water, index, lake, river, flood, wetland, aquatic, hydrology, moisture]
    inputs: [RasterPath]
    outputs: [NDWIMap]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.ndwi"
    triggers:
      keywords: [ndwi, water, "water index", "water body", waterbody, lake, river, flood]
      action_phrases:
        - "calculate ndwi"
        - "compute ndwi"
        - "run ndwi"
        - "ndwi calculation"
        - "ndwi analysis"
        - "detect water"
        - "find water"
        - "map water"
    user_guide:
      capability_response: |
        Yes, I can detect water bodies using NDWI (Normalized Difference Water Index)!
        NDWI = (Green - NIR) / (Green + NIR). Values > 0.3 typically indicate water.
        Please upload a GeoTIFF image with Green and NIR bands.
      missing_file_response: |
        I'd be happy to detect water bodies for you! Please upload a GeoTIFF image
        with Green and NIR bands, and I'll compute NDWI.
      summary_template: "Detecting water bodies using NDWI"
    config:
      formula: ndwi
      required_bands: [green, nir]
      colormap: ndwi
      vmin: -0.5
      vmax: 0.5

  - id: algorithms/ndsi
    kind: algorithm
    display_name: "NDSI Calculation"
    description: |
      NDSI (Normalized Difference Snow Index) for snow and glacier detection.
      Computed as (Green - SWIR) / (Green + SWIR). Values above 0.42 typically
      indicate snow/ice coverage. Useful for glacier monitoring and snow mapping.
    interpretation: |
      NDSI ranges from -1 to 1. Values ≥0.4 indicate snow/ice cover; 0.2-0.4 mixed or
      thin snow; <0.2 snow-free surfaces; negative values typically indicate vegetation.
      Water bodies may show moderate positive NDSI and require additional masking.
    keywords: [ndsi, snow, ice, glacier, frozen, winter, alpine, mountain, cryosphere, sentinel, landsat]
    inputs: [RasterPath]
    outputs: [NDSIMap]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.ndsi"
    triggers:
      keywords: [ndsi, snow, ice, glacier, frozen, "snow index", "ice cover"]
      action_phrases:
        - "calculate ndsi"
        - "compute ndsi"
        - "ndsi calculation"
        - "ndsi analysis"
        - "detect snow"
        - "find snow"
        - "map snow"
        - "snow detection"
        - "snow mapping"
        - "glacier detection"
        - "glacier mapping"
    user_guide:
      capability_response: |
        Yes, I can analyze snow and ice coverage using NDSI (Normalized Difference Snow Index),
        a basic snow index using (Green - SWIR) / (Green + SWIR). Please upload a GeoTIFF image
        with Green and SWIR bands (e.g., Sentinel-2 or Landsat).
      missing_file_response: |
        I'd be happy to compute NDSI for you. Please upload a GeoTIFF image with
        Green and SWIR bands (e.g., Sentinel-2 or Landsat).
      summary_template: "Analyzing snow/ice coverage using NDSI"
    config:
      formula: ndsi
      required_bands: [green, swir]
      colormap: ndsi
      vmin: -0.5
      vmax: 1.0

  - id: algorithms/snow-classifier
    kind: algorithm
    display_name: "Snow Classifier (multi-criteria)"
    description: |
      Multi-criteria snow classification for robust snow detection. Combines
      NDSI (>=0.4), NDVI (~0.1), and brightness (>0.3) thresholds to reduce
      false positives compared to basic NDSI thresholding. More accurate across
      varying terrain and atmospheric conditions.
    interpretation: |
      Multi-criteria classification combining NDSI ≥0.4, NDVI ≤0.1, and NIR reflectance
      >0.3. Snow coverage percentage represents proportion of pixels meeting all criteria.
      This approach reduces commission errors from water bodies and shadows.
    keywords: [snow, classifier, classification, snow-classifier, snow-classification, ice, glacier, frozen, winter, alpine, mountain, cryosphere, multi-criteria, robust]
    inputs: [RasterPath]
    outputs: [SnowClassification]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.snow_classifier"
    triggers:
      keywords: ["snow classifier", "snow classification", "robust snow", "multi-criteria snow"]
      action_phrases:
        - "run snow classifier"
        - "use snow classifier"
        - "classify snow"
        - "snow classification"
    user_guide:
      capability_response: |
        Yes, I can run a multi-criteria Snow Classifier that combines NDSI (≥0.4), NDVI
        (≤0.1), and NIR brightness (>0.3) to reduce false positives from water bodies
        and shadows compared to basic NDSI thresholding. Please upload a GeoTIFF image
        with Green, Red, NIR, and SWIR bands (e.g., Sentinel-2 or Landsat).
      missing_file_response: |
        I'd be happy to run the multi-criteria Snow Classifier. Please upload a
        GeoTIFF image with Green, Red, NIR, and SWIR bands (e.g., Sentinel-2 or Landsat).
      summary_template: "Classifying snow/ice coverage with multi-criteria thresholds"

  - id: algorithms/statistics
    kind: algorithm
    display_name: "Raster Statistics"
    description: |
      Comprehensive raster statistics including min, max, mean, standard deviation,
      and percentiles for all bands. Generates histograms for data distribution analysis.
    interpretation: |
      Band statistics characterize spectral distribution. Standard deviation indicates
      intra-scene variability; high values suggest heterogeneous land cover. Difference
      between mean and median reveals distribution skewness. Percentiles help identify
      outliers and inform histogram stretching for visualization.
    keywords: [statistics, stats, distribution, histogram, percentiles, analysis]
    inputs: [RasterPath]
    outputs: [Statistics]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.statistics"
    triggers:
      keywords: [statistics, stats, distribution, histogram, percentiles]
      action_phrases:
        - "extract statistics"
        - "get statistics"
        - "compute statistics"
        - "calculate statistics"
        - "raster statistics"
    user_guide:
      capability_response: |
        Yes, I can calculate statistics from your raster data including min, max, mean,
        and standard deviation. Please upload a GeoTIFF image and I'll analyze it.
      missing_file_response: |
        I can calculate statistics for you! Please upload a GeoTIFF image and I'll
        compute the raster statistics.
      summary_template: "Computing raster statistics"

  - id: algorithms/change-detection
    kind: algorithm
    display_name: "Change Detection (multi-index)"
    description: |
      Multi-index change detection comparing two time periods. Supports NDVI (vegetation),
      NDSI (snow/ice), and NDWI (water) indices. Computes temporal change between before
      and after images, identifying areas of loss or gain.
    interpretation: |
      Index difference (after minus before) quantifies change. Negative values indicate
      loss (vegetation decline, snow melt, water retreat); positive values indicate gain
      (vegetation growth, snow accumulation, flooding). Default is NDVI for vegetation.
      Use IndexType parameter to specify: "ndvi" for vegetation, "ndsi" for snow/ice,
      "ndwi" for water bodies.
    keywords: [change, detection, difference, compare, comparison, temporal, before, after, loss, gain, vegetation, snow, water, ndvi, ndsi, ndwi]
    inputs: [RasterPathBefore, RasterPathAfter, IndexType]
    outputs: [ChangeMap]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.change_detection"
    triggers:
      keywords:
        - "change detection"
        - "detect changes"
        - "compare images"
        - "image comparison"
        - "temporal comparison"
        - "image difference"
        - "temporal difference"
        - "ndvi change"
        - "ndsi change"
        - "ndwi change"
        - "vegetation change"
        - "vegetation changes"
        - "snow change"
        - "ice change"
        - "ice cover change"
        - "ice cover changes"
        - "water change"
        - "glacier change"
        - "glacier melt"
        - "snow melt"
        - "flood detection"
        - "flooding"
        - "before"
        - "after"
      action_phrases:
        - "change detection"
        - "ndvi change"
        - "ndsi change"
        - "ndwi change"
        - "vegetation change"
        - "snow change"
        - "ice change"
        - "water change"
        - "glacier change"
        - "analyze vegetation changes"
        - "analyze ndvi changes"
        - "analyze ice cover changes"
    user_guide:
      capability_response: |
        Yes, I can perform change detection to compare two images and identify
        vegetation, snow/ice, or water changes over time. Please upload two GeoTIFF
        images (before and after) and I'll analyze the differences.
      missing_file_response: |
        I can perform change detection! Please upload two GeoTIFF images
        (before and after) and I'll analyze the differences.
      summary_template: "Comparing before/after imagery and computing temporal change"
    config:
      # Maps free-text index keywords (matched against the user prompt) to the
      # IndexType bind value the executor passes to change_detection.run().
      # Read by planner._detect_index_type to route prompts to the right index.
      default_index_type: ndvi
      index_keyword_map:
        ndvi: [ndvi, vegetation, "vegetation change"]
        ndsi: [ndsi, snow, ice, glacier, frozen, melt, "ice cover", "ice cover change"]
        ndwi: [ndwi, water, flood, lake, river, reservoir, drought]

  - id: algorithms/lulc-classifier
    kind: algorithm
    display_name: "Land Use / Land Cover (LULC) Classification"
    description: |
      Land Use / Land Cover (LULC) classification using spectral index thresholds.
      Classifies pixels into Water, Snow/Ice, Bare Soil, Sparse Vegetation,
      Cropland/Grassland, and Dense Vegetation using NDVI, NDWI, and NDSI indices.
      Rule-based approach suitable for rapid assessment without training data.
    interpretation: |
      Classification based on spectral index thresholds: Water (NDWI>0.2 or NDVI<-0.1 or wet areas),
      Snow/Ice (NDSI>0.4 with high brightness), Bare Soil (NDVI<0.15, NDWI<-0.1),
      Sparse Vegetation (0.1≤NDVI<0.3), Cropland/Grassland (0.3≤NDVI<0.5),
      Dense Vegetation (NDVI≥0.5). Dominant class indicates primary land cover type.
    keywords: [lulc, land-use, land-cover, classification, classify, classes, water, soil, vegetation, cropland, forest, urban, mapping]
    inputs: [RasterPath]
    outputs: [LULCMap]
    runner:
      type: python
      entrypoint: "dta.dti.algorithms.lulc_classifier"
    triggers:
      keywords: [lulc, "land cover", "land use", "land-cover classes", classify]
      action_phrases:
        - "classify land cover"
        - "classify land use"
        - "classify lulc"
        - "land cover classification"
        - "land use classification"
        - "lulc classification"
        - "analyze land-cover classes"
        - "analyze land cover classes"
    user_guide:
      capability_response: |
        Yes, I can classify land cover using spectral indices! The LULC classifier
        identifies 6 classes: Water, Snow/Ice, Bare Soil, Sparse Vegetation,
        Cropland/Grassland, and Dense Vegetation. Please upload a multispectral
        GeoTIFF image (4+ bands with NIR).
      missing_file_response: |
        I'd be happy to classify land cover for you! Please upload a multispectral
        GeoTIFF image (4+ bands with NIR) and I'll identify the 6 LULC classes.
      summary_template: "Classifying land cover into 6 classes"

  - id: models/prithvi-reconstruction
    kind: model
    display_name: "Prithvi MAE Reconstruction"
    description: |
      NASA/IBM Prithvi foundation model for satellite imagery analysis. Uses Masked
      Autoencoder (MAE) to reconstruct HLS imagery, revealing learned spatial and
      spectral patterns. Outputs RGB visualizations: original, masked, and predicted
      (reconstructed) images.
    interpretation: |
      Masked Autoencoder reconstructs masked patches using learned representations.
      Reconstruction quality indicates how well the model captures spatial-spectral patterns.
      Compare predicted vs original RGB composites to assess feature preservation.
    keywords: [prithvi, reconstruction, mae, masked, autoencoder, predict, visualize, foundation, hls, geotiff, nasa, ibm]
    inputs: [RasterPath]
    outputs: [Reconstruction]
    model_id: prithvi-eo-v1-100m
    triggers:
      keywords: [prithvi, reconstruction, mae, "masked autoencoder", "foundation model", embedding, embeddings, features]
      action_phrases:
        - "reconstruct image"
        - "reconstruct this image"
        - "prithvi reconstruction"
        - "run prithvi"
        - "extract prithvi features"
    user_guide:
      capability_response: |
        Yes, I can run NASA/IBM's Prithvi foundation model on your imagery. It uses a
        Masked Autoencoder to reconstruct HLS imagery, revealing learned spatial and
        spectral patterns. Please upload a GeoTIFF image to get started.
      missing_file_response: |
        I can run Prithvi reconstruction for you! Please upload a GeoTIFF image and
        I'll generate the masked-autoencoder reconstruction.
      summary_template: "Running Prithvi MAE reconstruction"
    preprocessors:
      - id: preprocessors/scale-to-hls
        apply_to: RasterPath
    runner:
      type: python
      entrypoint: "${MODEL_PATH}/inference.py"
      function: main
      args_map:
        data_files: ["${RasterPath}"]
        config_path: "${MODEL_PATH}/config.json"
        checkpoint: "${MODEL_PATH}/Prithvi_EO_V1_100M.pt"
        output_dir: "${OUTPUT_DIR}"
        rgb_outputs: true
        mask_ratio: 0.75

  - id: models/delineate-anything
    kind: model
    display_name: "Field Boundary Detection (Delineate-Anything)"
    description: |
      Delineate-Anything field boundary detection using YOLO-based segmentation.
      Auto-detects data source (Sentinel/Planet/Maxar) and configures appropriate
      filtering thresholds. Outputs GeoPackage with field polygons.
    interpretation: |
      Field count and total area characterize agricultural parcelization. Mean field size
      (total_area/num_fields) indicates farming scale: <1 ha suggests smallholder systems;
      >10 ha indicates mechanized agriculture. Output GeoPackage preserves source CRS.
    keywords: [delineate, field, boundary, boundaries, agriculture, parcels, segmentation, yolo, extract, detect, farm, crop, plot, land, polygon, vector, outline, edges]
    inputs: [RasterPath]
    outputs: [FieldBoundaries]
    model_id: delineate-anything-small
    triggers:
      keywords: [delineate, field, fields, boundary, boundaries, parcel, parcels, "field boundaries", "agricultural parcels"]
      action_phrases:
        - "detect field boundaries"
        - "find field boundaries"
        - "identify field boundaries"
        - "field boundary detection"
        - "field boundaries detection"
        - "delineate fields"
        - "delineate parcels"
        - "delineate boundaries"
    user_guide:
      capability_response: |
        Yes, I can detect field boundaries using the Delineate-Anything model.
        This will identify agricultural parcels in your satellite image.
        Please upload a GeoTIFF image and I'll detect the field boundaries for you.
      missing_file_response: |
        I can detect field boundaries for you! Please upload a GeoTIFF satellite image
        and I'll identify the agricultural parcels.
      summary_template: "Detecting agricultural field boundaries"
    runner:
      type: python
      entrypoint: "dta/dti/models/third_party/delineate_anything/inference.py"
      args_map:
        RasterPath: "${RasterPath}"
        delineate_model: "small"

  - id: post-processing/agent-analysis
    kind: postprocess
    keywords: [llm, summarize, analysis]
    inputs: []  # Agent can work with any available artifacts
    outputs: []
    runner:
      type: agent
      prompt_template: "prompts/analysis.md"

  # =============================================================================
  # Preprocessors - Reusable data transformations applied before model execution
  # =============================================================================

  - id: preprocessors/scale-to-hls
    kind: preprocessor
    description: |
      Scales raster data to HLS (Harmonized Landsat Sentinel) format.
      Converts 0-1 surface reflectance to 0-10000 HLS scale.
      Useful for models trained on HLS data (e.g., Prithvi).
    runner:
      type: python
      entrypoint: "dta.dti.preprocessors.scale_to_hls"
      function: run

  # =============================================================================
  # Hosted Models (DT4LC Team) - Models hosted on external platforms
  # =============================================================================
  # These are core DT4LC models developed by the team but hosted externally.
  # Integration status: planned -> active -> deprecated

  - id: models/ndvi-convlstm
    kind: model
    keywords: [ndvi, forecast, prediction, convlstm, lstm, deep-learning, vegetation, health, greenness, time-series, temporal, ukraine, agriculture, crop, monitoring, satellite, remote-sensing]
    description: |
      ConvLSTM NDVI Forecasting Model - Predicts vegetation health in Ukrainian
      agricultural regions. Uses 6 weeks of input data to forecast 4 future weeks
      of NDVI values. Trained on Cherkasy, Vinnytsia, and Mykolaiv oblasts (2018-2021).
    inputs: [NDVITimeSeries, WeatherData, TerrainData, SoilData]
    outputs: [NDVIForecast]
    integration:
      type: huggingface-spaces
      url: "https://huggingface.co/spaces/LordZeee/ndvi-convlstm"
      status: planned
    metadata:
      team: "DT4LC"
      author: "LordZeee"
      hosting: "huggingface"
      features: 20

  - id: models/pinn-linda
    kind: model
    keywords: [pinn, physics-informed, neural-network, deep-learning, precipitation, rain, nowcasting, weather, forecast, prediction, linda, lagrangian, radar, meteorology, short-term, real-time]
    description: |
      PINN-LINDA Weather Nowcasting - Physics-Informed Neural Network implementing
      LINDA (Lagrangian Integro-Difference equation with Nowcasting and Data Assimilation)
      for short-term precipitation forecasting. Compares traditional LINDA with PINN-enhanced
      approaches using radar precipitation sequences.
    inputs: [RadarSequence, ForecastConfig]
    outputs: [PrecipitationForecast]
    integration:
      type: huggingface-spaces
      url: "https://huggingface.co/spaces/yaotj/swissdt"
      status: planned
    metadata:
      team: "DT4LC"
      author: "yaotj"
      hosting: "huggingface"
      framework: "gradio"
      source_code: "https://github.com/4rste1f/DT4LC-project/tree/master/digital_twin/pinn_gradio"

  - id: models/vi-forecasting-dti
    kind: model
    keywords: [vegetation, index, ndvi, evi, savi, forecast, prediction, time-series, temporal, earth-engine, gee, satellite, remote-sensing, agriculture, crop, monitoring, cloud-computing]
    description: |
      Vegetation Index Forecasting DTI - Time-series forecasting model for
      vegetation indices using Google Earth Engine integration.
    inputs: [RasterPath, TimeRange]
    outputs: [VIForecast]
    integration:
      type: google-earth-engine
      url: "https://ee-sofidrozd13.projects.earthengine.app/view/viforecastingdti"
      status: planned
      requires: ["earthengine-api"]
    metadata:
      team: "DT4LC"
      author: "sofidrozd13"
      hosting: "gee"
      platform: "Google Earth Engine"
